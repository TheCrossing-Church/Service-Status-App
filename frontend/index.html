<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Apple PWA. Real PNG home-screen icons should replace this SVG when
         brand assets are available; iOS ≥ 16 honors SVG apple-touch-icon. -->
    <link rel="apple-touch-icon" href="/icon.svg" />
    <!-- mobile-web-app-capable is the modern equivalent; iOS still reads
         the apple- prefix, so we ship both. Chrome dev tools warns if only
         the apple- form is present. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Service Status — The Crossing</title>
  </head>
  <body class="bg-slate-50 text-slate-900 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
