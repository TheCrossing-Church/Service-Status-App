# Local dev:
#   docker compose up -d            → just Postgres; run the app with `npm run dev`.
#
# Full stack (matches the VMware target):
#   docker compose --profile prod up -d --build
#   docker compose --profile prod run --rm migrate   # one-shot migrations
#   docker compose --profile prod run --rm seed      # one-shot seed
#
# Promote to the VMware Ubuntu/Docker host by copying this file + .env and
# running the same commands there. Caddy auto-provisions Let's Encrypt certs
# when DOMAIN is a real hostname; with DOMAIN=localhost it serves a self-signed cert.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-service_progress}
    ports:
      - "5432:5432"
    volumes:
      - service_progress_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-service_progress}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    profiles: ["prod"]
    build: .
    image: service-progress-app
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      # Inside the docker network the DB host is the service name.
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-service_progress}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "4000"

  migrate:
    profiles: ["prod", "migrate"]
    build: .
    image: service-progress-app
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-service_progress}
    command: ["node", "dist/scripts/migrate.js"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  seed:
    profiles: ["seed"]
    build: .
    image: service-progress-app
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-service_progress}
    command: ["node", "dist/scripts/seed.js"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  caddy:
    profiles: ["prod"]
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      CADDY_EMAIL: ${CADDY_EMAIL:-it@thecrossing.church}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  service_progress_pgdata:
  caddy_data:
  caddy_config:
