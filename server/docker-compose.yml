# Local dev:
#   docker compose up -d            → just Postgres; run the app with `npm run dev`.
#
# Full stack (matches the VMware target):
#   docker compose --profile prod up -d --build
#   docker compose --profile prod run --rm migrate   # one-shot migrations
#   docker compose --profile prod run --rm seed      # one-shot seed
#
# Promote to the VMware Ubuntu/Docker host by copying this dir + .env and
# running the same commands there. nginx listens on HTTP/80 only; terminate
# TLS upstream (Cloudflare in front, recommended) or add a `listen 443` block
# in nginx.conf and mount certs (see commented block at bottom of nginx.conf).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-service_progress}
    ports:
      - "5432:5432"
    volumes:
      - service_progress_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-service_progress}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    profiles: ["prod"]
    build: .
    image: service-progress-app
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      # Inside the docker network the DB host is the service name.
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-service_progress}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "4000"

  migrate:
    profiles: ["prod", "migrate"]
    build: .
    image: service-progress-app
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-service_progress}
    command: ["node", "dist/scripts/migrate.js"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  seed:
    profiles: ["seed"]
    build: .
    image: service-progress-app
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-service_progress}
    command: ["node", "dist/scripts/seed.js"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  nginx:
    profiles: ["prod"]
    image: nginx:1-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      # Uncomment when terminating TLS at nginx (certbot or manual certs):
      # - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Frontend build mount — currently a placeholder index.html until the
      # React PWA build pipeline lands; then point this at frontend/dist.
      - ./web:/usr/share/nginx/html:ro
      # Uncomment when running a certbot sidecar:
      # - ./letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app

volumes:
  service_progress_pgdata:
