## Service Progress Update Tool — nginx config
##
## Single server block on port 80. TLS is intentionally NOT terminated here.
## Two supported deployment shapes:
##   1. Cloudflare in front (recommended starter): Cloudflare terminates HTTPS,
##      forwards HTTP to this nginx. No certs to manage on the VM.
##   2. certbot sidecar / managed certs: add a `listen 443 ssl;` block (sketch
##      at the bottom of this file) and mount certs into the container.

worker_processes auto;
events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  65;
  server_tokens      off;
  client_max_body_size 256k;   # this app has no file uploads

  gzip              on;
  gzip_vary         on;
  gzip_min_length   1024;
  gzip_types        text/plain text/css text/javascript application/javascript
                    application/json image/svg+xml;

  # Backend Node app, reachable by docker-network DNS as `app`.
  upstream app {
    server app:3000;
    keepalive 32;
  }

  server {
    listen      80 default_server;
    server_name _;

    # Status page must not be indexed (PRD §5).
    add_header X-Robots-Tag "noindex, nofollow" always;

    # ── SSE: keep the connection open and don't buffer ─────────────────
    location = /api/events {
      proxy_pass              http://app;
      proxy_http_version      1.1;
      proxy_set_header        Host              $host;
      proxy_set_header        X-Real-IP         $remote_addr;
      proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header        X-Forwarded-Proto $scheme;
      proxy_buffering         off;
      proxy_cache             off;
      proxy_read_timeout      24h;
      proxy_send_timeout      24h;
      chunked_transfer_encoding on;
    }

    # ── All other API requests ─────────────────────────────────────────
    location /api/ {
      proxy_pass              http://app;
      proxy_http_version      1.1;
      proxy_set_header        Host              $host;
      proxy_set_header        X-Real-IP         $remote_addr;
      proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header        X-Forwarded-Proto $scheme;
      proxy_set_header        Connection        "";  # enable upstream keepalive
    }

    # ── Health check (mirrors backend route at /health, not /api/health) ──
    location = /health {
      proxy_pass              http://app;
      proxy_http_version      1.1;
      proxy_set_header        Host              $host;
      proxy_set_header        Connection        "";
      access_log              off;
    }

    # ── React PWA static build (SPA routing) ──────────────────────────
    location / {
      root      /usr/share/nginx/html;
      try_files $uri $uri/ /index.html;

      # Hashed assets are immutable — cache aggressively.
      location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        add_header X-Robots-Tag "noindex, nofollow" always;
      }
    }
  }

  ## ── HTTPS (uncomment when ready to terminate TLS at nginx) ──────────
  ##
  ## server {
  ##   listen 443 ssl http2;
  ##   server_name servicestatus.thecrossing.church;
  ##   ssl_certificate     /etc/letsencrypt/live/servicestatus.thecrossing.church/fullchain.pem;
  ##   ssl_certificate_key /etc/letsencrypt/live/servicestatus.thecrossing.church/privkey.pem;
  ##   # ...repeat the location blocks above...
  ## }
  ##
  ## server {
  ##   listen 80;
  ##   server_name servicestatus.thecrossing.church;
  ##   return 301 https://$host$request_uri;
  ## }
}
